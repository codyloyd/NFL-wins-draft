<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draft Picks - WINS DRAFT</title>
  <link rel="apple-touch-icon" href="american-football-player.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Roboto:ital,wght@0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <script type="module" src="picks.js"></script>
</head>
<style>
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Roboto', sans-serif;
    background-color: #111;
    color: #eee;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 30px;
  }

  .main-content {
    min-width: 0;
  }

  .sidebar {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 20px;
    height: fit-content;
    position: sticky;
    top: 20px;
    border: 1px solid #333;
  }

  .sidebar h3 {
    margin: 0 0 20px 0;
    text-align: center;
    font-size: 24px;
    font-family: 'Teko', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #ff4444;
  }

  .player-picks {
    margin-bottom: 16px;
    background: #222;
    border-radius: 8px;
    padding: 15px;
    border: 1px solid #333;
  }

  .player-picks h4 {
    margin: 0 0 10px 0;
    font-size: 16px;
    border-bottom: 1px solid #444;
    padding-bottom: 5px;
    color: #eee;
  }

  .pick-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 14px;
    color: #ccc;
  }

  .pick-logo {
    width: 24px;
    height: 24px;
    border-radius: 50%;
  }

  .pick-order {
    background: #d00;
    color: white;
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: bold;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    background:
      radial-gradient(circle at 20% 50%, rgba(255,255,255,0.06) 1px, transparent 1px),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04) 1px, transparent 1px),
      radial-gradient(circle at 50% 80%, rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(135deg, #c00 0%, #d00 40%, #a00 100%);
    background-size: 6px 6px, 6px 6px, 6px 6px, 100% 100%;
    margin: -20px -20px 24px;
    padding: 28px 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    border-bottom: 4px solid #ff4444;
  }

  .header h1 {
    font-family: 'Teko', sans-serif;
    font-size: 3rem;
    margin: 0;
    color: white;
    text-transform: uppercase;
    letter-spacing: 3px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 40px rgba(255,68,68,0.15);
    font-style: italic;
  }

  .nav {
    text-align: center;
    margin-bottom: 24px;
  }

  .nav a {
    color: white;
    text-decoration: none;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 24px;
    margin: 0 10px;
    border-radius: 6px;
    transition: all 0.2s;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 0.5px;
  }

  .nav a:hover {
    background: rgba(255,255,255,0.2);
    transform: translateY(-1px);
  }

  .players-section {
    background: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 24px;
    border: 1px solid #333;
  }

  .players-section h3 {
    color: #eee;
    margin: 0 0 16px;
    font-family: 'Teko', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .players-input {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .players-input input {
    padding: 10px 14px;
    border: 1px solid #444;
    border-radius: 6px;
    font-size: 16px;
    background: #222;
    color: #eee;
    flex: 1;
    min-width: 180px;
  }

  .players-input input::placeholder {
    color: #888;
  }

  .players-input button {
    padding: 10px 24px;
    background: #d00;
    color: white;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .players-input button:hover {
    background: #e22;
    transform: translateY(-1px);
  }

  .current-players {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .player-tag {
    background: #333;
    color: #eee;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 14px;
    border: 1px solid #555;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .sort-controls label {
    color: #aaa;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sort-controls select {
    padding: 10px 14px;
    border: 1px solid #444;
    border-radius: 6px;
    font-size: 14px;
    background: #222;
    color: #eee;
  }

  .view-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .view-controls label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 14px;
    color: #ccc;
  }

  .view-controls input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: #d00;
  }

  .current-picker {
    background: linear-gradient(135deg, #1a0000, #220000);
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    border: 2px solid #d00;
    color: #eee;
    box-shadow: 0 0 20px rgba(221,0,0,0.1);
    font-family: 'Teko', sans-serif;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }

  .team-card {
    background: #1a1a1a;
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    border: 2px solid #333;
    position: relative;
    overflow: hidden;
  }

  .team-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #d00, #ff4444);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .team-card:hover {
    background: #222;
    transform: translateY(-3px);
    border-color: #d00;
    box-shadow: 0 8px 24px rgba(221,0,0,0.2);
  }

  .team-card:hover::before {
    opacity: 1;
  }

  .team-card.selected {
    background: #1a1a1a;
    border-color: #555;
    opacity: 0.4;
  }

  .team-card.selected::before {
    opacity: 0;
  }

  .team-header {
    display: flex;
    align-items: center;
    gap: 15px;
    margin-bottom: 10px;
  }

  .team-logo {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
  }

  .team-name {
    font-size: 18px;
    font-weight: bold;
    color: #eee;
  }

  .team-stats {
    font-size: 13px;
    color: #888;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .team-picker {
    margin-top: 10px;
    font-size: 12px;
    font-style: italic;
    color: #d00;
    font-weight: 600;
  }

  .loading {
    text-align: center;
    font-size: 18px;
    padding: 50px;
    color: #aaa;
  }

  @media (max-width: 768px) {
    .container {
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .sidebar {
      position: static;
      order: -1;
    }

    .teams-grid {
      grid-template-columns: 1fr;
    }

    .controls {
      flex-direction: column;
      align-items: stretch;
      gap: 15px;
    }

    .sort-controls, .view-controls {
      text-align: center;
    }

    .header {
      margin: -20px -20px 24px;
    }
  }
</style>
<body>
  <div class="container">
    <div class="main-content">
      <div class="header">
        <h1>DRAFT PICKS</h1>
      </div>
      
      <div class="nav">
        <a href="index.html">Back to Wins</a>
      </div>

      <div class="players-section">
        <h3>Players</h3>
        <div class="players-input">
          <input type="text" id="playerInput" placeholder="Enter player name" />
          <button onclick="addPlayer()">Add Player</button>
        </div>
        <div class="current-players" id="currentPlayers"></div>
      </div>

      <div class="controls">
        <div class="sort-controls">
          <label>Sort by: </label>
          <select id="sortSelect" onchange="sortTeams()">
            <option value="wins-desc">Most Wins (2024)</option>
            <option value="wins-asc">Least Wins (2024)</option>
            <option value="name-asc">Team Name A-Z</option>
            <option value="name-desc">Team Name Z-A</option>
          </select>
        </div>

        <div class="view-controls">
          <label>
            <input type="checkbox" id="hideSelected" checked onchange="renderTeams()">
            Hide selected teams
          </label>
        </div>
        
        <div class="draft-controls">
          <button id="generateDraftBtn" onclick="generateDraftData()" style="
            background: #d00;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            margin: 10px 0;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 2px 8px rgba(221,0,0,0.2);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
          " onmouseover="this.style.backgroundColor='#e22';this.style.transform='translateY(-1px)'" onmouseout="this.style.backgroundColor='#d00';this.style.transform='none'">
            📋 Generate & Copy Draft Data
          </button>
        </div>
        
        <div class="current-picker" id="currentPicker">
          Add players to start drafting
        </div>
      </div>

      <div class="loading" id="loading">Loading teams...</div>
      <div class="teams-grid" id="teamsGrid" style="display: none;"></div>
    </div>

    <div class="sidebar">
      <h3>Draft Board</h3>
      <div id="draftBoard">
        <p style="opacity: 0.7; text-align: center; font-style: italic;">
          Add players and start drafting to see picks here
        </p>
      </div>
    </div>
  </div>
</body>
</html>
